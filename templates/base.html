<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        /* Apply chalkboard font to the whole portal */
        body, input, select, textarea, button, .table {
            font-family: 'Patrick Hand', cursive !important;
            font-size: 1.15rem;
            background-color: #f8f9fa; 
        }
        
        .navbar-brand {
            font-size: 2.2rem;
            letter-spacing: 2px;
        }

        /* Nav Link Hover Effect */
        .nav-link {
            transition: 0.2s ease-in-out;
        }
        .nav-link:hover {
            color: #000 !important;
            transform: scale(1.05);
            text-decoration: underline dashed 2px;
        }

        /* Chalkboard Specific Styles */
        .chalk-header {
            font-size: 2.5rem;
            border-bottom: 2px dashed #000;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        
        .form-control, .form-select {
            background-color: #e9ecef;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        /* Customizing the Bootstrap Table */
        .table th {
            background-color: #ced4da !important;
            font-weight: bold;
            border: 1px solid #adb5bd;
            font-size: 1.25rem;
        }
        .table td {
            border: 1px solid #adb5bd;
            vertical-align: middle;
        }
    </style>
    <style>
        /* Bike Selector Card Styles */
        .bike-card {
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
            border: 2px solid #e9ecef;
            border-radius: 12px;
        }
        .bike-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            border-color: #f0ad4e; /* Highlights orange on hover like your mockup */
        }
        .bike-card-title {
            color: #f0ad4e; /* Orange color from your mockup */
            font-weight: bold;
            font-size: 1.4rem;
        }
    </style>
    <title>PIF Portal</title>
</head>
<body>
    
    <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom border-dark mb-4 shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold text-dark" href="/">PIF Portal</a>
            
            <button class="navbar-toggler border-dark" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto fs-4 align-items-center"> 
                    {% if session.get('username') %}
                        <!-- Displays the logged-in username -->
                        <li class="nav-item me-4">
                            <span class="navbar-text text-dark fs-5">
                                👤 Welcome, <strong style="color: #f0ad4e;">{{ session.username }}</strong>!
                            </span>
                        </li>
                        
                        <li class="nav-item me-3">
                            <a class="nav-link text-dark fw-bold" href="/">Dashboard</a>
                        </li>
                        <li class="nav-item me-3">
                            <a class="nav-link fw-bold px-3 rounded" href="/add" style="background-color: #9cd4f0; color: #000; border: 1px solid #000;">
                                ➕ New Order
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-danger fw-bold" href="/logout">Logout</a>
                        </li>
                    {% endif %}
                </ul>
            </div>
        </div>
    </nav>

    <div class="container pb-5">
        {% block content %}{% endblock %}
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
