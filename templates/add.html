{% extends 'base.html' %}
{% block content %}

<div class="row justify-content-center">
    <div class="col-lg-12">
        <div class="card bg-white p-4 shadow-sm border-0 mb-5">
            <h1 class="chalk-header fw-bold text-center">New Order Form</h1>
            
            <form method="POST">
                
                <div class="row align-items-center mb-3 mt-4">
                    <div class="col-md-3 text-md-end"><label class="fw-bold">Order Date</label></div>
                    <div class="col-md-9"><input type="date" id="order_date" name="order_date" class="form-control" required></div>
                </div>

                <div class="row align-items-center mb-3">
                    <div class="col-md-3 text-md-end"><label class="fw-bold">Bike Shop</label></div>
                    <div class="col-md-9">
                        <select name="shop_name" class="form-select">
                            <option value="BENTONVILLE">BENTONVILLE</option>
                            <option value="ROGERS">ROGERS</option>
                            <option value="SPRINGDALE">SPRINGDALE</option>
                        </select>
                    </div>
                </div>

                <div class="row align-items-center mb-3">
                    <div class="col-md-3 text-md-end"><label class="fw-bold">Contact Name</label></div>
                    <div class="col-md-9"><input type="text" id="contact_name" name="contact_name" class="form-control" placeholder="First Name Last Name" oninput="syncFirstRow()" required></div>
                </div>

                <div class="row align-items-center mb-3">
                    <div class="col-md-3 text-md-end"><label class="fw-bold">Contact Phone</label></div>
                    <div class="col-md-9"><input type="tel" id="contact_phone_number" name="contact_phone_number" class="form-control" placeholder="(XXX)-XXX-XXXX" pattern="\(\d{3}\)-\d{3}-\d{4}" title="Format: (XXX)-XXX-XXXX" oninput="formatPhone(this)" required></div>
                </div>

                <div class="row align-items-center mb-3">
                    <div class="col-md-3 text-md-end"><label class="fw-bold">Contact Email</label></div>
                    <div class="col-md-9"><input type="email" name="contact_email" class="form-control" placeholder="address@domain.com" required></div>
                </div>

                <div class="row align-items-center mb-3">
                    <div class="col-md-3 text-md-end"><label class="fw-bold">Pedal Partner</label></div>
                    <div class="col-md-9"><input type="text" name="pedal_partner_name" class="form-control" placeholder="First Name Last Name"></div>
                </div>

                <div class="row align-items-center mb-4">
                    <div class="col-md-3 text-md-end"><label class="fw-bold">Order Type</label></div>
                    <div class="col-md-9">
                        <select name="order_type" class="form-select">
                            <option value="Standard" selected>Standard</option>
                            <option value="Walkin">Walkin</option>
                            <option value="Speciality">Speciality</option>
                        </select>
                    </div>
                </div>

                <h3 class="fw-bold mt-5 mb-2 d-flex align-items-center gap-3">
                    Recipient List 
                    <span class="badge bg-dark rounded-pill fs-5 pb-2">Total Bikes: <span id="bikeCounter" class="text-info">1</span></span>
                </h3>
                
                <div class="table-responsive border border-dark rounded">
                    <table class="table table-bordered align-middle text-nowrap mb-0" id="recipient_table">
                        <thead class="text-center">
                            <tr>
                                <th>Name</th>
                                <th>Bike Style</th>
                                <th style="width: 80px;">Age</th>
                                <th style="width: 120px;">Height</th>
                                <th>Style Choice 1</th>
                                <th>Style Choice 2</th>
                                <th style="width: 150px;">Notes</th>
                                <th style="width: 50px;"></th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>
                                    <div class="form-check mb-1">
                                      <input class="form-check-input border-dark" type="checkbox" id="sync_contact" onchange="syncFirstRow()">
                                      <label class="form-check-label small" for="sync_contact">Same as Contact</label>
                                    </div>
                                    <input type="text" id="recipient_name_0" name="recipient_name[]" class="form-control border-secondary" required>
                                </td>
                                <td>
                                    <select name="bike_style_preference[]" class="form-select border-secondary">
                                        <option value="" selected disabled></option>
                                        <option value="Male">Male</option>
                                        <option value="Female">Female</option>
                                        <option value="No Preference">No Preference</option>
                                    </select>
                                </td>
                                <td><input type="number" name="age[]" class="form-control border-secondary" min="0" max="120" step="1" onkeypress="return event.charCode >= 48 && event.charCode <= 57"></td>
                                <td><select name="height[]" class="form-select height-dropdown border-secondary"></select></td>
                                <td>
                                    <input type="text" name="bike_type_first_choice[]" class="form-control border-secondary bg-white text-center cursor-pointer" readonly placeholder="Click to Select" onclick="openStyleModal(this)">
                                </td>
                                
                                <td>
                                    <input type="text" name="bike_type_second_choice[]" class="form-control border-secondary bg-white text-center cursor-pointer" readonly placeholder="Click to Select" onclick="openStyleModal(this)">
                                </td>
                                <td><input type="text" name="notes[]" class="form-control border-secondary"></td>
                                <td></td> </tr>
                        </tbody>
                    </table>
                </div>

                <div class="mt-2 mb-4">
                    <button type="button" class="btn btn-info text-white fw-bold px-3 py-1 border border-dark shadow-sm" style="background-color: #9cd4f0;" onclick="addRow()">➕ Add Recipient</button>
                </div>

                <div class="text-center mt-5 border-top border-dark dashed pt-4">
                    <button type="submit" class="btn btn-success px-5 py-2 fw-bold fs-3 shadow" style="background-color: #7ef161; color: #000; border: 2px solid #000; border-radius: 10px;">Submit Order</button>
                </div>

            </form>
        </div>
    </div>
</div>

<script>
    // --- Generate Height Options ---
    let heightOptionsHTML = '<option value="" selected disabled></option>';
    heightOptionsHTML += '<option value="< 3\'0&quot;">< 3\'0"</option>';
    for (let feet = 3; feet <= 6; feet++) {
        for (let inches = 0; inches <= 11; inches++) {
            heightOptionsHTML += `<option value="${feet}'${inches}&quot;">${feet}'${inches}"</option>`;
        }
    }
    heightOptionsHTML += '<option value="7\'0&quot;">7\'0"</option>';
    heightOptionsHTML += '<option value="> 7\'0&quot;">> 7\'0"</option>';

    // --- On Page Load ---
    document.addEventListener('DOMContentLoaded', (event) => {
        document.getElementById('order_date').valueAsDate = new Date();
        document.querySelector('.height-dropdown').innerHTML = heightOptionsHTML;
        updateCounter(); // Initialize counter
    });

    // --- Phone Formatter ---
    function formatPhone(input) {
        let val = input.value.replace(/\D/g, ''); 
        if (val.length > 0) { val = '(' + val; }
        if (val.length > 3) { val = val.substring(0, 4) + ')-' + val.substring(4); }
        if (val.length > 8) { val = val.substring(0, 9) + '-' + val.substring(9, 13); }
        input.value = val;
    }

    // --- Sync Contact to Row 1 ---
    function syncFirstRow() {
        const isChecked = document.getElementById('sync_contact').checked;
        const contactName = document.getElementById('contact_name').value;
        const recipientInput = document.getElementById('recipient_name_0');
        
        if (isChecked) {
            recipientInput.value = contactName;
            recipientInput.readOnly = true;
            recipientInput.style.backgroundColor = '#d3d3d3';
        } else {
            if (recipientInput.readOnly) {
                recipientInput.value = '';
            }
            recipientInput.readOnly = false;
            recipientInput.style.backgroundColor = '#e9ecef';
        }
    }

    // --- NEW: Update Bike Counter ---
    function updateCounter() {
        const rowCount = document.querySelectorAll('#recipient_table tbody tr').length;
        document.getElementById('bikeCounter').innerText = rowCount;
    }

    // --- NEW: Copy Previous Row Logic ---
    function copyPrevious(checkboxElem) {
        if (!checkboxElem.checked) return;

        const currentRow = checkboxElem.closest('tr');
        const prevRow = currentRow.previousElementSibling;

        if (prevRow) {
            // 1. Copy all Dropdowns (Selects)
            const currentSelects = currentRow.querySelectorAll('select');
            const prevSelects = prevRow.querySelectorAll('select');
            currentSelects.forEach((select, index) => {
                select.value = prevSelects[index].value;
            });

            // 2. Copy Age & Notes (We skip Name so it doesn't duplicate individuals)
            const currentAge = currentRow.querySelector('input[name="age[]"]');
            const prevAge = prevRow.querySelector('input[name="age[]"]');
            if (currentAge && prevAge) currentAge.value = prevAge.value;

            const currentNotes = currentRow.querySelector('input[name="notes[]"]');
            const prevNotes = prevRow.querySelector('input[name="notes[]"]');
            if (currentNotes && prevNotes) currentNotes.value = prevNotes.value;
        }
    }

    // --- Update Add Row Function ---
    function addRow() {
        const table = document.getElementById('recipient_table').getElementsByTagName('tbody')[0];
        const newRow = table.insertRow();
        
        // Notice the new checkbox added above the Recipient Name input
        newRow.innerHTML = `
            <td>
                <div class="form-check mb-1">
                    <input class="form-check-input border-dark" type="checkbox" onchange="copyPrevious(this)">
                    <label class="form-check-label small text-primary fw-bold">Copy Prev Config</label>
                </div>
                <input type="text" name="recipient_name[]" class="form-control border-secondary" required>
            </td>
            <td>
                <select name="bike_style_preference[]" class="form-select border-secondary">
                    <option value="" selected disabled></option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                    <option value="No Preference">No Preference</option>
                </select>
            </td>
            <td><input type="number" name="age[]" class="form-control border-secondary" min="0" max="120" step="1" onkeypress="return event.charCode >= 48 && event.charCode <= 57"></td>
            <td><select name="height[]" class="form-select border-secondary">${heightOptionsHTML}</select></td>
            <td>
                <select name="bike_type_first_choice[]" class="form-select border-secondary">
                    <option value="" selected disabled></option>
                    <option value="A">A</option><option value="B">B</option>
                    <option value="C">C</option><option value="D">D</option>
                    <option value="E">E</option><option value="F">F</option>
                </select>
            </td>
            <td>
                <select name="bike_type_second_choice[]" class="form-select border-secondary">
                    <option value="" selected disabled></option>
                    <option value="A">A</option><option value="B">B</option>
                    <option value="C">C</option><option value="D">D</option>
                    <option value="E">E</option><option value="F">F</option>
                </select>
            </td>
            <td><input type="text" name="notes[]" class="form-control border-secondary"></td>
            <td class="text-center align-middle">
                <button type="button" class="btn btn-sm btn-danger fw-bold border border-dark" onclick="this.closest('tr').remove(); updateCounter();">X</button>
            </td>
        `;
        
        updateCounter(); // Recalculate counter after row is added
    }

    // --- Visual Card Selector Logic ---
    let currentTargetInput = null;

    function openStyleModal(inputElement) {
        // Remember which input box was clicked
        currentTargetInput = inputElement;
        // Show the Bootstrap modal
        const styleModal = new bootstrap.Modal(document.getElementById('bikeStyleModal'));
        styleModal.show();
    }

    function selectBikeStyle(styleName) {
        if (currentTargetInput) {
            // Put the selected bike name into the table input
            currentTargetInput.value = styleName;
        }
        // Hide the modal
        const modalElement = document.getElementById('bikeStyleModal');
        const styleModalInstance = bootstrap.Modal.getInstance(modalElement);
        if (styleModalInstance) {
            styleModalInstance.hide();
        }
    }
</script>
<div class="modal fade" id="bikeStyleModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content border-dark" style="font-family: 'Patrick Hand', cursive;">
            <div class="modal-header border-dark bg-light">
                <h3 class="modal-title fw-bold">Select Bike Style</h3>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body bg-white">
                <div class="row g-3">
                    
                    <div class="col-md-4">
                        <div class="card h-100 bike-card" onclick="selectBikeStyle('A')">
                            <div class="card-body text-center p-2">
                                <div class="bike-card-title">A</div>
                                <img src="{{ url_for('static', filename='imgs/BikeA.png') }}" alt="Toddler Bike" class="img-fluid my-2 rounded">
                            </div>
                        </div>
                    </div>

                    <div class="col-md-4">
                        <div class="card h-100 bike-card" onclick="selectBikeStyle('B')">
                            <div class="card-body text-center p-2">
                                <div class="bike-card-title">B</div>
                                <img src="{{ url_for('static', filename='imgs/BikeB.png') }}"  alt="Kid Bike" class="img-fluid my-2 rounded">
                            </div>
                        </div>
                    </div>

                    <div class="col-md-4">
                        <div class="card h-100 bike-card" onclick="selectBikeStyle('C')">
                            <div class="card-body text-center p-2">
                                <div class="bike-card-title">C</div>
                                <img src="{{ url_for('static', filename='imgs/BikeC.png') }}"  alt="BMX Bike" class="img-fluid my-2 rounded">
                            </div>
                        </div>
                    </div>

                    <div class="col-md-4">
                        <div class="card h-100 bike-card" onclick="selectBikeStyle('D')">
                            <div class="card-body text-center p-2">
                                <div class="bike-card-title">D</div>
                                <img src="{{ url_for('static', filename='imgs/BikeD.png') }}"  alt="BMX Bike" class="img-fluid my-2 rounded">
                            </div>
                        </div>
                    </div>

                    <div class="col-md-4">
                        <div class="card h-100 bike-card" onclick="selectBikeStyle('E')">
                            <div class="card-body text-center p-2">
                                <div class="bike-card-title">E</div>
                                <img src="{{ url_for('static', filename='imgs/BikeE.png') }}"  alt="BMX Bike" class="img-fluid my-2 rounded">
                            </div>
                        </div>
                    </div>

                    <div class="col-md-4">
                        <div class="card h-100 bike-card" onclick="selectBikeStyle('F')">
                            <div class="card-body text-center p-2">
                                <div class="bike-card-title">F</div>
                                <img src="{{ url_for('static', filename='imgs/BikeF.png') }}"  alt="BMX Bike" class="img-fluid my-2 rounded">
                            </div>
                        </div>
                    </div>

                    </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
